name: Daily AI News

# Runs every day at 00:00 UTC (08:00 Taipei); also manually triggerable
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      # Must run before setup-node so `cache: pnpm` can find pnpm.
      # Version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        # --prod=false guarantees build tools (vue-tsc, vite) install even if
        # the runner sets NODE_ENV=production (which would otherwise omit devDeps)
        run: pnpm install --frozen-lockfile --prod=false

      - name: Collect today's AI news
        run: pnpm fetch-news

      - name: Build
        # For project pages (https://<user>.github.io/<repo>/), set BASE_PATH=/<repo>/
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

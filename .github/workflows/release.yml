name: Release

run-name: Release v${{ inputs.release_version }}

# Manually triggered: fill in a version. It creates an empty "Version X.Y.Z"
# marker commit on the branch, then tags it and publishes a GitHub Release.
# Deployment is intentionally NOT done here — the Daily AI News workflow already
# deploys main to Pages (and would overwrite any release deploy anyway).
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (example: 0.0.2)"
        required: true
        type: string

permissions:
  contents: write # push the version commit + create tag/release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate version and check tag is free
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::release_version must look like 0.0.2 or 1.2.3-beta.1 (no leading 'v')"
            exit 1
          fi
          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$RELEASE_VERSION already exists"
            exit 1
          fi

      - name: Create version commit
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Version $RELEASE_VERSION"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          gh release create "$tag" \
            --target "${{ steps.version.outputs.sha }}" \
            --title "$tag" \
            --notes "Release $tag"

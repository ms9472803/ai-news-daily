name: Release

run-name: Release v${{ inputs.release_version }}

# Manually triggered: fill in a version, it builds + deploys to Pages,
# then tags and publishes a GitHub Release.
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (example: 0.0.2)"
        required: true
        type: string

permissions:
  contents: write # create tag + release
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version and check tag is free
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::release_version must look like 0.0.2 or 1.2.3-beta.1 (no leading 'v')"
            exit 1
          fi
          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$RELEASE_VERSION already exists"
            exit 1
          fi

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --prod=false

      - name: Collect today's AI news
        run: pnpm fetch-news

      - name: Build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Release $tag · Live: ${{ steps.deploy.outputs.page_url }}"
